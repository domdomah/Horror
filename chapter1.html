<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>القرين</title>
<link href="https://fonts.googleapis.com/css2?family=Alice&display=swap" rel="stylesheet">

<style> 
body{background:#000;color:#ccc;font-family:'Alice',serif;padding:40px}
h1{color:#A11212}
a{color:#A11212;text-decoration:none}
.chapter-content{
    line-height: 2.2;
    font-size: 18px;
    max-width: 800px;
    margin: auto;
}

.chapter-nav{
    display: flex;
    justify-content: center;
    gap: 15px;
    margin-top: 40px;
}

.btn{
    padding: 10px 15px;
    border: 1px solid #A11212;
    color: #A11212;
    text-decoration: none;
    border-radius: 6px;
    transition: 0.3s;
}

.btn:hover{
    background: #A11212;
    color: #000;
}

.home{
    border-color: #444;
    color: #ccc;
}

.home:hover{
    background: #444;
    color: #fff;
}
</style>
</head>

<body>
<h1>القرين</h1>
<p>قريباً...</p>
<div class="chapter-nav">
    <a id="prev" class="btn">← السابق</a>
    <a href="Dumdum.html" class="btn home">الرئيسية</a>
    <a id="next" class="btn">التالي →</a>
</div>
  <script>
const pages = [
"chapter1.html",
"chapter2.html",
"chapter3.html",
"chapter4.html",
"chapter5.html",
"chapter6.html",
"chapter7.html",
"chapter8.html",
"chapter9.html",
"chapter10.html",
"chapter11.html",
"chapter12.html",
"chapter13.html"
];

const current = window.location.pathname.split("/").pop();
const index = pages.indexOf(current);

const prevBtn = document.getElementById("prev");
const nextBtn = document.getElementById("next");

// السابق
if(index > 0){
    prevBtn.href = pages[index - 1];
} else {
    prevBtn.style.display = "none";
}

// التالي
if(index < pages.length - 1){
    nextBtn.href = pages[index + 1];
} else {
    nextBtn.style.display = "none";
}
  </script>
</body>
</html>
