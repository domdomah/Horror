<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>رعب الدمادم</title>

<link href="https://fonts.googleapis.com/css2?family=Alice&display=swap" rel="stylesheet">

<style>
html, body {
    margin: 0;
    padding: 0;
    background: #000;
    color: #ccc;
    font-family: 'Alice', serif;
    scroll-behavior: smooth;
}

/* ===== navbar ===== */
.navbar {
    position: fixed;
    top: 0;
    width: 100%;
    height: 60px;
    background: #000;
    border-bottom: 1px solid #111;

    display: flex;
    justify-content: center;   /* 🔥 هذا يجعل العناصر في النص */
    align-items: center;
    gap: 25px;

    z-index: 1000;
}

.navbar a {
    color: #b8860b;
    text-decoration: none;
    cursor: pointer;
    font-weight: bold;
}

/* ===== menu ===== */
.menu {
    display: none;
    position: fixed;
    top: 70px;
    left: 50%;
    transform: translateX(-50%);
    background: #111;
    padding: 15px;
    width: 250px;
    border: 1px solid #222;
    z-index: 2000;
}

.menu a {
    display: block;
    padding: 10px;
    color: #aaa;
    text-decoration: none;
}

.menu a:hover {
    color: #b8860b;
}

/* ===== hero ===== */
.hero {
    padding: 120px 20px 40px;
    text-align: center;
}

.hero h1 {
    color: #b8860b;
    font-size: 50px;
}

/* ===== chapters ===== */
.chapter {
    display: none;
    padding: 40px;
    max-width: 800px;
    margin: auto;
}

.chapter h2 {
    color: #b8860b;
}
</style>
</head>

<body>

<!-- ===== navbar ===== -->
<div class="navbar">
    <a onclick="scrollHome()">الرئيسية</a>
    <a onclick="toggleMenu()">الفصول</a>
</div>

<!-- ===== menu ===== -->
<div class="menu" id="menu">
    <a onclick="showChapter('c1')">القرين</a>
    <a onclick="showChapter('c2')">النداهة</a>
    <a onclick="showChapter('c3')">عيشة قنديشة</a>
</div>

<!-- ===== hero ===== -->
<div class="hero" id="home">
    <h1>رعب الدمادم</h1>
<img src="file_000000009350720aa4c1db8e94ea60d5.png" 
     alt="القمر الدموي، رعب الدمادم" 
     width="200" 
     loading="lazy">

<div class="summary">
    رعب الدمادم: سلسلة رعب خيالي ذات طابع مصري وعربي.
</div>
  
    <p>سلسلة رعب عربية خيالية</p>
</div>

<!-- ===== chapters ===== -->
<div class="chapter" id="c1">
    <h2>القرين</h2>
    <p>قريباً...</p>
</div>

<div class="chapter" id="c2">
    <h2>النداهة</h2>
    <p>قريباً...</p>
</div>

<div class="chapter" id="c3">
    <h2>عيشة قنديشة</h2>
    <p>قريباً...</p>
</div>

<script>
const menu = document.getElementById("menu");

function toggleMenu(){
    menu.style.display = (menu.style.display === "block") ? "none" : "block";
}

function showChapter(id){
    document.querySelectorAll(".chapter").forEach(c => c.style.display = "none");
    document.getElementById(id).style.display = "block";
    menu.style.display = "none";
}

function scrollHome(){
    document.getElementById("home").scrollIntoView({behavior:"smooth"});
}

window.addEventListener("click", function(e){
    if(!e.target.closest(".navbar") && !e.target.closest(".menu")){
        menu.style.display = "none";
    }
});
</script>

</body>
</html>
