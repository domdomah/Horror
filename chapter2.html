<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>النداهة</title>
<link href="https://fonts.googleapis.com/css2?family=Alice&display=swap" rel="stylesheet">

<style>
body{background:#000;color:#ccc;font-family:'Alice',serif;padding:40px;text-align:center}
h1{color:#A11212;margin-bottom:20px}
.chapter-content{line-height:2.4;font-size:18px;max-width:700px;margin:auto}
.chapter-nav{display:flex;justify-content:center;gap:15px;margin-top:40px;flex-wrap:wrap}
.btn{padding:10px 15px;border:1px solid #A11212;color:#A11212;text-decoration:none;border-radius:6px}
.btn:hover{background:#A11212;color:#000}
.home{border:1px solid #A11212;color:#A11212}
.home:hover{background:#A11212;color:#000}
@media (max-width:768px){body{padding:20px}.btn{width:100%;text-align:center}.chapter-nav{flex-direction:column}}
</style>
</head>

<body>

<h1>النداهة</h1>
<div class="chapter-content">قريباً...</div>

<div class="chapter-nav">
<a id="prev" class="btn">← السابق</a>
<a href="Dumdum.html" class="btn home">الرئيسية</a>
<a id="next" class="btn">التالي →</a>
</div>

<script>
const pages=[
"chapter1.html","chapter2.html","chapter3.html","chapter4.html","chapter5.html",
"chapter6.html","chapter7.html","chapter8.html","chapter9.html","chapter10.html",
"chapter11.html","chapter12.html","chapter13.html"
];
const current=location.pathname.split("/").pop();
const i=pages.indexOf(current);
prev=document.getElementById("prev");
next=document.getElementById("next");
if(i>0) prev.href=pages[i-1]; else prev.style.display="none";
if(i<pages.length-1) next.href=pages[i+1]; else next.style.display="none";
</script>

</body>
</html>
